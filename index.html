<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Map</title>
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
</head>

<body>
    <div id="sidebar" class="sidebar">
        <button id="close-btn" class="close-btn">&times;</button>
        <div id="sidebar-content">
            <div class="sidebar-header">
                <div class="sidebar-title-row">
                    <span id="sidebar-emoji"></span>
                    <h2 id="sidebar-name"></h2>
                </div>
                <button id="navigate-btn" class="navigate-btn">Navigate Here 🚶</button>
            </div>
            <div class="room-search-container">
                <input type="text" id="room-search" placeholder="Search rooms...">
                <ul id="room-search-results"></ul>
            </div>
            <div id="floor-tabs" class="floor-tabs"></div>
            <div class="floor-plan-container">
                <svg id="floor-plan" width="100%" height="250" viewBox="0 0 380 250"></svg>
            </div>
            <div id="room-info" class="room-info hidden">
                <h3 id="room-name"></h3>
                <p><strong>Number:</strong> <span id="room-number"></span></p>
                <p><strong>Type:</strong> <span id="room-type"></span></p>
                <p><strong>Capacity:</strong> <span id="room-capacity"></span></p>
            </div>
        </div>
    </div>

    <button id="locate-btn" class="locate-btn" title="Locate Me">📍</button>
    <button id="clear-route-btn" class="clear-route-btn hidden" title="Clear Route">✖</button>
    <div id="toast" class="toast"></div>

    <div class="search-container">
        <input type="text" id="search-box" placeholder="Search for a building...">
        <div class="filter-bar">
            <button class="filter-btn active" data-category="All">All</button>
            <button class="filter-btn" data-category="Academic">Academic</button>
            <button class="filter-btn" data-category="Food">Food</button>
            <button class="filter-btn" data-category="Admin">Admin</button>
            <button class="filter-btn" data-category="Sports">Sports</button>
        </div>
        <ul id="search-results"></ul>
    </div>
    <div id="map"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>
    <script>
        // Initialize the map
        const map = L.map('map').setView([12.3366, 76.6187], 17);

        // Add OpenStreetMap tiles
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        const buildingPolygons = {}; // Store polygons by building name
        const categoryColors = {
            'Academic': '#1976d2', 'Food': '#f57c00', 'Admin': '#d32f2f', 'Sports': '#388e3c'
        };



        const buildingsData = [
            { "name": "A Block", "lat": 12.33645, "lng": 76.61890, "description": "The central administrative and academic block of VVCE.", "department": "Administration", "hours": "9:00 AM - 5:00 PM", "emoji": "🏢", "category": "Admin", "polygon": [[12.3366083, 76.6189053], [12.3364831, 76.6187642], [12.3362947, 76.6189523], [12.3364394, 76.6190817], [12.3366083, 76.6189053]] },
            { "name": "B Block", "lat": 12.33605, "lng": 76.61885, "description": "Home to the Computer Science and Engineering department labs and classrooms.", "department": "Computer Science", "hours": "8:00 AM - 6:00 PM", "emoji": "💻", "category": "Academic", "polygon": [[12.3358855, 76.6188673], [12.3360916, 76.6190267], [12.3362410, 76.6188544], [12.3360287, 76.6187223], [12.3358855, 76.6188673]] },
            { "name": "M Block", "lat": 12.33630, "lng": 76.61960, "description": "Workshops and laboratories for Mechanical Engineering students.", "department": "Mechanical Engineering", "hours": "8:30 AM - 5:30 PM", "emoji": "⚙️", "category": "Academic", "polygon": [[12.3365046, 76.6193447], [12.3365031, 76.6193950], [12.3364895, 76.6198447], [12.3364833, 76.6200522], [12.3361561, 76.6200878], [12.3362142, 76.6193665], [12.3362549, 76.6193368], [12.3365046, 76.6193447]] },
            { "name": "ECE Department", "lat": 12.33555, "lng": 76.61885, "description": "Electronics and Communication Engineering department building.", "department": "Electronics and Communication", "hours": "8:30 AM - 5:30 PM", "emoji": "📡", "category": "Academic", "polygon": [[12.3356778, 76.6188994], [12.3355737, 76.6189871], [12.3354534, 76.6188190], [12.3355962, 76.6187637], [12.3356778, 76.6188994]] },
            { "name": "H Block", "lat": 12.33537, "lng": 76.61980, "description": "Central library offering a vast collection of books, journals, and digital resources.", "department": "Resources", "hours": "8:00 AM - 8:00 PM", "emoji": "📚", "category": "Academic", "polygon": [[12.3353289, 76.6199899], [12.3354206, 76.6199925], [12.3354219, 76.6197219], [12.3353412, 76.6197212], [12.3353349, 76.6198633], [12.3353289, 76.6199899]] },
            { "name": "Canteen", "lat": 12.33619, "lng": 76.61905, "description": "Campus cafeteria serving meals and snacks for students and staff.", "department": "Food Services", "hours": "7:30 AM - 6:00 PM", "emoji": "☕", "category": "Food", "polygon": [[12.3361979, 76.6190022], [12.3362414, 76.6190518], [12.3362135, 76.6190786], [12.3361888, 76.6191023], [12.3361428, 76.6190501], [12.3361979, 76.6190022]] },
            { "name": "Sports Complex", "lat": 12.33560, "lng": 76.61970, "description": "Outdoor sports facility for cricket, football, and athletics.", "department": "Physical Education", "hours": "6:00 AM - 7:00 PM", "emoji": "⚽", "category": "Sports", "polygon": [[12.3357751, 76.6199829], [12.3357857, 76.6198162], [12.3358058, 76.6195008], [12.3358123, 76.6193984], [12.3355197, 76.6193784], [12.3355144, 76.6194401], [12.3354327, 76.6194377], [12.3354227, 76.6199610], [12.3354575, 76.6199631], [12.3357751, 76.6199829]] },
            { "name": "D Block", "lat": 12.33500, "lng": 76.61960, "description": "Main auditorium for college events, seminars, and cultural fests.", "department": "Events", "hours": "Open during events", "emoji": "🎭", "category": "Admin", "polygon": [[12.3351890, 76.6192814], [12.3351855, 76.6193297], [12.3351466, 76.6198664], [12.3351361, 76.6200118], [12.3350068, 76.6200178], [12.3350080, 76.6199468], [12.3349198, 76.6199360], [12.3349293, 76.6198325], [12.3348411, 76.6198253], [12.3348493, 76.6196544], [12.3347894, 76.6196412], [12.3348587, 76.6192453], [12.3351890, 76.6192814]] },
            { "name": "CCD", "lat": 12.3369430, "lng": 76.6187666, "description": "Café Coffee Day outlet for refreshing beverages.", "department": "Food Services", "hours": "8:00 AM - 8:00 PM", "emoji": "☕", "category": "Food", "polygon": [[12.3369430, 76.6187666], [12.3369430, 76.6188134], [12.3368874, 76.6188126], [12.3368874, 76.6187744], [12.3368874, 76.6187635], [12.3369430, 76.6187666]] },
            { "name": "Polytechnic", "lat": 12.3372701, "lng": 76.6196927, "description": "Polytechnic institute building.", "department": "Polytechnic", "hours": "9:00 AM - 5:00 PM", "emoji": "📐", "category": "Academic", "polygon": [[12.3372701, 76.6196927], [12.3372521, 76.6198442], [12.3373080, 76.6198756], [12.3373008, 76.6199735], [12.3372911, 76.6200130], [12.3372701, 76.6200992], [12.3371997, 76.6201324], [12.3368009, 76.6200918], [12.3368261, 76.6196816], [12.3369073, 76.6196336], [12.3372701, 76.6196927]] },
            { "name": "BCA/MCA", "lat": 12.33594, "lng": 76.62031, "description": "Master of Business Administration block.", "department": "MBA", "hours": "9:00 AM - 5:00 PM", "emoji": "📊", "category": "Academic", "polygon": [[12.3359433, 76.6203127], [12.3359337, 76.6204100], [12.3356714, 76.6203827], [12.3354366, 76.6203510], [12.3354648, 76.6202022], [12.3354923, 76.6201749], [12.3357100, 76.6202149], [12.3357025, 76.6202609], [12.3358954, 76.6202787], [12.3358987, 76.6202923], [12.3359228, 76.6202940], [12.3359203, 76.6203102], [12.3359433, 76.6203127]] },
            { "name": "PU College", "lat": 12.33621, "lng": 76.62033, "description": "Pre-University College building.", "department": "PU College", "hours": "8:30 AM - 4:00 PM", "emoji": "🎓", "category": "Academic", "polygon": [[12.3362184, 76.6203315], [12.3362772, 76.6203279], [12.3362737, 76.6203544], [12.3365794, 76.6203809], [12.3365794, 76.6204146], [12.3365916, 76.6204170], [12.3366040, 76.6204194], [12.3366040, 76.6204687], [12.3366664, 76.6204579], [12.3366581, 76.6205626], [12.3365667, 76.6205597], [12.3364665, 76.6205566], [12.3364336, 76.6205085], [12.3364265, 76.6204567], [12.3362125, 76.6204447], [12.3362184, 76.6203315]] },
            { "name": "KP School", "lat": 12.33663, "lng": 76.62057, "description": "KP School campus building.", "department": "School", "hours": "8:00 AM - 3:00 PM", "emoji": "🏫", "category": "Academic", "polygon": [[12.3366370, 76.6205722], [12.3366354, 76.6206257], [12.3366323, 76.6207299], [12.3366487, 76.6207275], [12.3366487, 76.6208033], [12.3366323, 76.6208033], [12.3366499, 76.6208334], [12.3366482, 76.6209323], [12.3366464, 76.6210380], [12.3366605, 76.6211595], [12.3365946, 76.6211716], [12.3365594, 76.6210837], [12.3365735, 76.6210416], [12.3365723, 76.6208274], [12.3365935, 76.6208189], [12.3365876, 76.6207395], [12.3365594, 76.6207383], [12.3365667, 76.6205597], [12.3366370, 76.6205722]] },
            { "name": "ITI", "lat": 12.33598, "lng": 76.62030, "description": "Industrial Training Institute.", "department": "ITI", "hours": "9:00 AM - 5:00 PM", "emoji": "🛠️", "category": "Academic", "polygon": [[12.3359842, 76.6203007], [12.3362035, 76.6203146], [12.3361968, 76.6204143], [12.3359666, 76.6203936], [12.3359842, 76.6203007]] },
            { "name": "MBA", "lat": 12.33632, "lng": 76.61806, "description": "Bachelor of Computer Applications building.", "department": "Computer Applications", "hours": "9:00 AM - 5:00 PM", "emoji": "💻", "category": "Academic", "polygon": [[12.3361447, 76.6179379], [12.3361705, 76.6179622], [12.3362218, 76.6179054], [12.3362419, 76.6179399], [12.3362568, 76.6179328], [12.3362756, 76.6179622], [12.3363837, 76.6179663], [12.3364036, 76.6179399], [12.3364155, 76.6179399], [12.3364413, 76.6179135], [12.3364849, 76.6179683], [12.3365133, 76.6179446], [12.3365696, 76.6180153], [12.3364135, 76.6181744], [12.3363670, 76.6181266], [12.3363609, 76.6181389], [12.3363986, 76.6181795], [12.3363818, 76.6182008], [12.3363639, 76.6181825], [12.3363470, 76.6181825], [12.3363470, 76.6182150], [12.3363262, 76.6182170], [12.3363232, 76.6181848], [12.3363074, 76.6181815], [12.3362856, 76.6181998], [12.3362705, 76.6181809], [12.3363024, 76.6181348], [12.3362816, 76.6181125], [12.3362299, 76.6181630], [12.3360795, 76.6180016], [12.3361447, 76.6179379]] },
            { "name": "G Block", "lat": 12.33547, "lng": 76.62013, "description": "G Block academic building.", "department": "Academic", "hours": "9:00 AM - 5:00 PM", "emoji": "🏢", "category": "Academic", "polygon": [[12.3354710, 76.6201329], [12.3353025, 76.6201149], [12.3352019, 76.6201385], [12.3351865, 76.6203121], [12.3354174, 76.6203378], [12.3354338, 76.6203378], [12.3354584, 76.6202024], [12.3354710, 76.6201329]] },
            { "name": "BB Court", "lat": 12.33710, "lng": 76.61910, "description": "Basketball Ground for students.", "department": "Physical Education", "hours": "6:00 AM - 7:00 PM", "emoji": "🏀", "category": "Sports", "polygon": [[12.3372, 76.61895], [12.3372, 76.61925], [12.3370, 76.61925], [12.3370, 76.61895], [12.3372, 76.61895]] }
        ];

        // Generate placeholder floors and rooms
        const floorNames = ["Ground Floor", "Floor 1", "Floor 2", "Floor 3"];
        const roomTypes = ["Classroom", "Lab", "Office", "Auditorium"];
        buildingsData.forEach(b => {
            b.floors = [];
            floorNames.forEach((fName, fIndex) => {
                const floor = { name: fName, rooms: [] };
                const numRooms = 4 + Math.floor(Math.random() * 4); // 4-7 rooms
                for (let i = 0; i < numRooms; i++) {
                    const type = roomTypes[Math.floor(Math.random() * roomTypes.length)];
                    floor.rooms.push({
                        id: `${b.name.replace(/\s+/g, '')}-F${fIndex}-R${i}`,
                        name: `${type} ${i + 1}`,
                        number: `${fIndex}0${i + 1}`,
                        capacity: 20 + Math.floor(Math.random() * 80),
                        type: type,
                        x: 10 + (i % 3) * 120, // Grid layout x
                        y: 10 + Math.floor(i / 3) * 110, // Grid layout y
                        w: 110,
                        h: 100
                    });
                }
                b.floors.push(floor);
            });
        });

        // Initialize building polygons
        buildingsData.forEach(building => {
            const coords = building.polygon;
            const color = categoryColors[building.category] || '#1976d2';

            const polygon = L.polygon(coords, {
                color: color,
                fillColor: color,
                fillOpacity: 0.5,
                weight: 2
            }).addTo(map);

            // Add tooltip instead of popup
            polygon.bindTooltip(`<b>${building.name}</b>`, { direction: 'center', className: 'building-tooltip' });

            buildingPolygons[building.name] = polygon;

            polygon.on('click', () => {
                map.flyTo([building.lat, building.lng], 19);
                openSidebar(building);
            });
        });

        // Filter Logic
        const filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const selectedCategory = btn.getAttribute('data-category');
                buildingsData.forEach(b => {
                    const poly = buildingPolygons[b.name];
                    if (selectedCategory === 'All' || b.category === selectedCategory) {
                        poly.setStyle({ fillOpacity: 0.5, opacity: 1 });
                    } else {
                        poly.setStyle({ fillOpacity: 0.1, opacity: 0.2 });
                    }
                });
            });
        });

        // Sidebar elements
        const sidebar = document.getElementById('sidebar');
        const closeBtn = document.getElementById('close-btn');
        const sidebarEmoji = document.getElementById('sidebar-emoji');
        const sidebarName = document.getElementById('sidebar-name');
        const floorTabs = document.getElementById('floor-tabs');
        const floorPlan = document.getElementById('floor-plan');
        const roomInfo = document.getElementById('room-info');
        const rName = document.getElementById('room-name');
        const rNumber = document.getElementById('room-number');
        const rType = document.getElementById('room-type');
        const rCap = document.getElementById('room-capacity');
        const roomSearchBox = document.getElementById('room-search');
        const roomSearchResults = document.getElementById('room-search-results');

        let currentBuilding = null;
        let currentFloorIndex = 0;

        function renderFloorPlan(floorIndex) {
            currentFloorIndex = floorIndex;
            floorPlan.innerHTML = '';
            roomInfo.classList.add('hidden'); // Hide room info on floor change

            // Update tabs
            Array.from(floorTabs.children).forEach((btn, idx) => {
                btn.classList.toggle('active', idx === floorIndex);
            });

            const floor = currentBuilding.floors[floorIndex];
            floor.rooms.forEach(room => {
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');

                const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                rect.setAttribute('x', room.x);
                rect.setAttribute('y', room.y);
                rect.setAttribute('width', room.w);
                rect.setAttribute('height', room.h);
                rect.setAttribute('class', 'room-rect');
                rect.dataset.id = room.id;

                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', room.x + room.w / 2);
                text.setAttribute('y', room.y + room.h / 2);
                text.setAttribute('class', 'room-text');
                text.textContent = room.name;

                g.appendChild(rect);
                g.appendChild(text);
                g.addEventListener('click', () => selectRoom(room));
                floorPlan.appendChild(g);
            });
        }

        function selectRoom(room) {
            document.querySelectorAll('.room-rect').forEach(r => r.classList.remove('selected'));
            const target = document.querySelector(`.room-rect[data-id="${room.id}"]`);
            if (target) target.classList.add('selected');

            rName.textContent = room.name;
            rNumber.textContent = room.number;
            rType.textContent = room.type;
            rCap.textContent = room.capacity;
            roomInfo.classList.remove('hidden');
        }

        function openSidebar(building) {
            currentBuilding = building;
            sidebarEmoji.textContent = building.emoji || '🏢';
            sidebarName.textContent = building.name;

            floorTabs.innerHTML = '';
            building.floors.forEach((floor, idx) => {
                const btn = document.createElement('button');
                btn.textContent = floor.name;
                btn.className = 'floor-tab-btn';
                btn.addEventListener('click', () => renderFloorPlan(idx));
                floorTabs.appendChild(btn);
            });

            roomSearchBox.value = '';
            roomSearchResults.classList.remove('active');

            renderFloorPlan(0);
            sidebar.classList.add('active');
        }

        closeBtn.addEventListener('click', () => sidebar.classList.remove('active'));

        // Room Search Logic
        roomSearchBox.addEventListener('input', function (e) {
            const query = e.target.value.toLowerCase();
            roomSearchResults.innerHTML = '';

            if (!query || !currentBuilding) {
                roomSearchResults.classList.remove('active');
                return;
            }

            const allRooms = [];
            currentBuilding.floors.forEach((floor, fIdx) => {
                floor.rooms.forEach(room => allRooms.push({ ...room, floorIndex: fIdx, floorName: floor.name }));
            });

            const filtered = allRooms.filter(r => r.name.toLowerCase().includes(query) || r.number.toLowerCase().includes(query));

            if (filtered.length > 0) {
                roomSearchResults.classList.add('active');
                filtered.forEach(room => {
                    const li = document.createElement('li');
                    li.textContent = `${room.name} (${room.floorName})`;
                    li.addEventListener('click', () => {
                        renderFloorPlan(room.floorIndex);
                        selectRoom(room);
                        roomSearchBox.value = room.name;
                        roomSearchResults.classList.remove('active');
                    });
                    roomSearchResults.appendChild(li);
                });
            } else {
                roomSearchResults.classList.remove('active');
            }
        });

        // Hide room results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.room-search-container')) {
                roomSearchResults.classList.remove('active');
            }
        });

        const searchBox = document.getElementById('search-box');
        const searchResults = document.getElementById('search-results');

        searchBox.addEventListener('input', function (e) {
            const query = e.target.value.toLowerCase();
            searchResults.innerHTML = '';

            if (!query) {
                searchResults.classList.remove('active');
                return;
            }

            const filtered = buildingsData.filter(b => b.name.toLowerCase().includes(query) || b.description.toLowerCase().includes(query));

            if (filtered.length > 0) {
                searchResults.classList.add('active');
                filtered.forEach(building => {
                    const li = document.createElement('li');
                    li.textContent = building.name;
                    li.addEventListener('click', () => {
                        // Fly to location and show tooltip
                        map.flyTo([building.lat, building.lng], 19);
                        buildingPolygons[building.name].openTooltip();

                        // Clear search
                        searchBox.value = building.name;
                        searchResults.classList.remove('active');

                        // Open sidebar
                        openSidebar(building);
                    });
                    searchResults.appendChild(li);
                });
            } else {
                searchResults.classList.remove('active');
            }
        });

        // Hide results when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.remove('active');
            }
        });

        // Geolocation
        const locateBtn = document.getElementById('locate-btn');
        const toast = document.getElementById('toast');
        let userMarker = null;

        function showToast(message) {
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        locateBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showToast('Geolocation is not supported by your browser');
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    if (userMarker) {
                        userMarker.setLatLng([lat, lng]);
                    } else {
                        const pulseIcon = L.divIcon({
                            className: 'pulsing-dot-wrapper',
                            html: '<div class="pulsing-dot"></div>',
                            iconSize: [14, 14],
                            iconAnchor: [7, 7]
                        });
                        userMarker = L.marker([lat, lng], { icon: pulseIcon }).addTo(map);
                    }
                    map.setView([lat, lng], 19);
                },
                () => {
                    showToast('Location access denied — enable in browser settings');
                }
            );
        });

        // Navigation / Routing Logic
        let routingControl = null;
        const navigateBtn = document.getElementById('navigate-btn');
        const clearRouteBtn = document.getElementById('clear-route-btn');

        function startNavigation() {
            if (!currentBuilding) return;

            // Define fallback user location (Main campus entrance area)
            const fallbackLat = 12.3370;
            const fallbackLng = 76.6180;

            const destLat = currentBuilding.lat;
            const destLng = currentBuilding.lng;

            // Close sidebar so user can see the route
            sidebar.classList.remove('active');

            if (!navigator.geolocation) {
                showToast('Geolocation not supported. Using fallback location.');
                drawRoute(fallbackLat, fallbackLng, destLat, destLng);
                return;
            }

            // Try to get real location
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    drawRoute(position.coords.latitude, position.coords.longitude, destLat, destLng);
                },
                () => {
                    showToast('Location access denied. Using fallback location.');
                    drawRoute(fallbackLat, fallbackLng, destLat, destLng);
                }
            );
        }

        function drawRoute(startLat, startLng, destLat, destLng) {
            // Remove existing route if any
            if (routingControl) {
                map.removeControl(routingControl);
            }

            routingControl = L.Routing.control({
                waypoints: [
                    L.latLng(startLat, startLng),
                    L.latLng(destLat, destLng)
                ],
                routeWhileDragging: false,
                addWaypoints: false,
                show: false, // Hide the turn-by-turn text box
                lineOptions: {
                    styles: [{ color: '#2ecc71', opacity: 0.9, weight: 6 }]
                },
                createMarker: function (i, wp, nWps) {
                    // Only add marker for start position, destination is already marked by building block
                    if (i === 0) {
                        return L.marker(wp.latLng, {
                            icon: L.divIcon({
                                className: 'pulsing-dot-wrapper',
                                html: '<div class="pulsing-dot" style="background: #2ecc71; box-shadow: 0 0 10px #2ecc71;"></div>',
                                iconSize: [14, 14],
                                iconAnchor: [7, 7]
                            })
                        });
                    }
                    return null;
                }
            }).addTo(map);

            clearRouteBtn.classList.remove('hidden');
        }

        navigateBtn.addEventListener('click', startNavigation);

        clearRouteBtn.addEventListener('click', () => {
            if (routingControl) {
                map.removeControl(routingControl);
                routingControl = null;
            }
            clearRouteBtn.classList.add('hidden');
        });
    </script>
</body>

</html>
